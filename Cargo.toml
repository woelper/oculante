[package]
name = "oculante"
version = "0.4.10"
authors = ["Johann Woelper <woelper@gmail.com>"]
edition = "2018"
license = "MIT"
repository = "https://github.com/woelper/oculante/"
description = "A minimalistic image viewer with analysis tools"
readme = "README.md"
keywords = ["graphics", "image", "viewer"]

[package.metadata.bundle]
name = "oculante"
identifier = "com.github.woelper.oculante"
icon = ["res/logo.png"]

[dependencies]
piston_window = "0.117.0"
piston2d-graphics = "0.39.0"
clap = "2.33.3"
image = "0.23.12"
nalgebra = "0.23.1"
dds-rs = "0.7.0"
rgb = "0.8.25"
psd = "0.1.9"
exr = "0.9.0"
gif-dispose = "2.4.0"
nsvg = "0.5.1"
gif = "0.10.3"
lazy_static = "*"
#libwebp-image = {version = "*", features = ["libwebp-1_1"]}
#libwebp = { version = "0.1.2", features = ["0_6"] }
libwebp-sys = "0.3"
imgui-gfx-renderer = "0.6.1"

gfx = "0.18"
#gfx_device_gl = "0.16"
#glutin = "0.26"
#imgui = "*"
# imgui-gfx-renderer = { path = "../imgui-gfx-renderer" }
#imgui-winit-support = "*"
#old_school_gfx_glutin_ext = "0.26"

# [features]
# opengl = ["imgui-gfx-renderer/opengl"]
# # FIXME
# # directx = ["imgui-gfx-renderer/directx"]
# default = ["opengl"]

[target.'cfg(windows)'.build-dependencies]
# this currently causes a link error LNK1356, check in the future if the problem was solved
windres = "0.2.1"

[profile.release]
lto = true

[profile.dev]
incremental = true
debug = false
